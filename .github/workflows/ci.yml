name: CI

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: app

jobs:
  # Static checks — no database needed.
  verify:
    name: lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run --workspace packages/web test   # web unit tests (no DB)

  # Tests — RLS isolation + unit — in their OWN job with a real Postgres service,
  # so the tenant-isolation suite can never be silently skipped (PROJECT-PLAN §5, S1-6).
  test:
    name: tests (RLS + unit)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_PG_ADMIN_URL: postgres://postgres@localhost:5432/postgres
      TEST_PGHOST: localhost
      TEST_PGPORT: '5432'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run test:coverage

  # Functional E2E (Playwright) + axe a11y, against a seeded API + the Vite server.
  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGPORT: '5432'
      E2E_ADMIN_URL: postgres://postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

# Pipeline order: lint → typecheck → build (verify) · unit → RLS (test) · Playwright (e2e).
